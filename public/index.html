<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BeZ Translate</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top left, #3b0764 0, transparent 35%), #09090b; color: #fafafa; }
    main { max-width: 1100px; margin: 0 auto; padding: 56px 18px; }
    h1 { font-size: clamp(38px, 7vw, 82px); line-height: .9; margin: 0 0 14px; letter-spacing: -0.07em; }
    p { color: #cbd5e1; font-size: 18px; margin: 0 0 24px; }
    .card { background: rgba(24,24,27,.78); border: 1px solid rgba(255,255,255,.11); border-radius: 26px; padding: 18px; box-shadow: 0 24px 80px rgba(0,0,0,.38); backdrop-filter: blur(18px); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    textarea { min-height: 320px; resize: vertical; }
    textarea, input, select { width: 100%; box-sizing: border-box; border: 1px solid rgba(255,255,255,.14); border-radius: 18px; background: rgba(0,0,0,.28); color: #fff; padding: 14px 16px; font: inherit; outline: none; }
    textarea:focus, input:focus, select:focus { border-color: #a78bfa; }
    .row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin: 14px 0; align-items: center; }
    button { border: 0; border-radius: 18px; padding: 15px 22px; font: inherit; font-weight: 750; color: #0a0a0a; background: linear-gradient(135deg, #e9d5ff, #67e8f9); cursor: pointer; }
    button:disabled { opacity: .55; cursor: wait; }
    .hint { font-size: 13px; color: #94a3b8; margin-top: 12px; }
    .err { color: #fca5a5; white-space: pre-wrap; margin-top: 12px; }
    label { display: block; font-size: 12px; color: #a1a1aa; margin: 0 0 5px 3px; }
    @media (max-width: 800px) { .grid, .row { grid-template-columns: 1fr; } main { padding-top: 28px; } }
  </style>
</head>
<body>
<main>
  <h1>BeZ Translate</h1>
  <p>Вставь любой текст. Язык оригинала определяется автоматически. Ключ хранится только в браузере.</p>
  <section class="card">
    <div class="row">
      <div><label>Куда переводить</label><input id="target" value="en" placeholder="en, ru, cn, de..." /></div>
      <div><label>Модель</label><input id="model" placeholder="openrouter/auto" /></div>
      <div><label>Endpoint</label><input id="endpoint" placeholder="https://openrouter.ai/api/v1" /></div>
      <button id="go">Перевести</button>
    </div>
    <div style="margin-bottom:14px"><label>OpenRouter/OpenAI API key</label><input id="key" type="password" placeholder="sk-or-..." /></div>
    <div class="grid">
      <textarea id="source" placeholder="Текст для перевода"></textarea>
      <textarea id="result" placeholder="Перевод" readonly></textarea>
    </div>
    <div class="hint">CLI: <code>npx -y github:megamen32/translate "Привет" --to en</code> · docs: <code>translate --docs</code></div>
    <div id="err" class="err"></div>
  </section>
</main>
<script>
const $ = id => document.getElementById(id);
const saved = JSON.parse(localStorage.getItem('bez_translate') || '{}');
for (const id of ['key','endpoint','model','target']) if (saved[id]) $(id).value = saved[id];
fetch('/api/config').then(r=>r.json()).then(c=>{ if (!$('endpoint').value) $('endpoint').value = c.endpoint; if (!$('model').value) $('model').value = c.model; }).catch(()=>{});
$('go').onclick = async () => {
  $('err').textContent = ''; $('go').disabled = true; $('go').textContent = 'Перевожу…';
  const settings = { key:$('key').value, endpoint:$('endpoint').value, model:$('model').value, target:$('target').value };
  localStorage.setItem('bez_translate', JSON.stringify(settings));
  try {
    const r = await fetch('/api/translate', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ text:$('source').value, targetLang:$('target').value, apiKey:$('key').value, endpoint:$('endpoint').value, model:$('model').value }) });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'translation failed');
    $('result').value = j.translated;
  } catch (e) { $('err').textContent = e.message; }
  finally { $('go').disabled = false; $('go').textContent = 'Перевести'; }
};
</script>
</body>
</html>
